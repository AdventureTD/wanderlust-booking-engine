<!-- Google tag (gtag.js) + Consent Mode v2 — paste in Wix Settings → Custom Code → Head -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MKGG3X1WP9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  // Default consent: denied until user confirms.
  gtag('consent', 'default', {
    ad_storage: 'denied',
    analytics_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied'
  });

  // Configuration: one config call per Google property.
  gtag('config', 'G-MKGG3X1WP9');
  gtag('config', 'AW-788746633');

  // Capture Google Ads click IDs before Wix's client-side router strips them.
  (function () {
    function parseParams(url) {
      const out = {};
      const idx = (url || '').indexOf('?');
      if (idx === -1) return out;
      const qs = url.substring(idx + 1);
      const pairs = qs.split('&');
      for (let i = 0; i < pairs.length; i++) {
        const pair = pairs[i];
        const eq = pair.indexOf('=');
        if (eq === -1) { out[decodeURIComponent(pair)] = ''; continue; }
        out[decodeURIComponent(pair.substring(0, eq))] = decodeURIComponent(pair.substring(eq + 1));
      }
      return out;
    }

    const params = parseParams(window.location.href);
    if (params.gclid || params.gbraid || params.wbraid) {
      try {
        const record = {
          gclid: params.gclid || '',
          gbraid: params.gbraid || '',
          wbraid: params.wbraid || '',
          landingUrl: window.location.href,
          capturedAt: new Date().toISOString()
        };
        localStorage.setItem('wl_click_attribution', JSON.stringify(record));
      } catch (e) {}
    }
  })();

  // Grant consent per-category: the Wix banner's analytics/advertising toggles
  // map to their matching Google Consent Mode signals. A blanket grant would
  // unlock ad cookies for analytics-only visitors — this keeps it precise.
  // grantConsent() with no args = full grant (legacy callers).
  var _granted = { analytics: false, advertising: false };
  function grantConsent(analytics, advertising) {
    if (analytics === undefined) { analytics = true; advertising = true; }
    var update = {};
    if (analytics && !_granted.analytics) {
      update.analytics_storage = 'granted';
      _granted.analytics = true;
    }
    if (advertising && !_granted.advertising) {
      update.ad_storage = 'granted';
      update.ad_user_data = 'granted';
      update.ad_personalization = 'granted';
      _granted.advertising = true;
    }
    if (Object.keys(update).length > 0) {
      gtag('consent', 'update', update);
      console.log('[WBE-CONSENT] Google consent updated:', JSON.stringify(update));
    }
  }

  // Path 1: custom event (kept for any future non-sandboxed dispatcher).
  document.addEventListener('wbeConsentGranted', function () { grantConsent(); });

  // Path 2 (primary): our own consent banner below. Choice persists in the
  // PAGE's localStorage (wbe_consent_choice: 'granted' | 'denied'), which is
  // readable here — unlike Velo's partitioned storage. On load, a stored
  // 'granted' re-grants silently; a stored 'denied' keeps defaults; no stored
  // choice shows the banner.
  (function () {
    // Master switch for the consent banner. Set false to hide the banner.
    // With the banner hidden you must also pick what consent defaults to:
    //   GRANT_ALL_WITHOUT_BANNER false  -> strict: everything stays denied
    //                                     (no GA4, no remarketing; EU-safe)
    //   GRANT_ALL_WITHOUT_BANNER true   -> track everyone silently (US-tolerant,
    //                                     NOT recommended if you get EU/UK traffic)
    var BANNER_ENABLED = false;
    var GRANT_ALL_WITHOUT_BANNER = true;
    var CHOICE_KEY = 'wbe_consent_choice';
    var PRIVACY_URL = 'https://www.wanderlustcaribbean.com/policies';

    if (!BANNER_ENABLED) {
      if (GRANT_ALL_WITHOUT_BANNER) { grantConsent(); }
      return;
    }

    function getChoice() {
      try { return localStorage.getItem(CHOICE_KEY); } catch (e) { return null; }
    }
    function setChoice(v) {
      try { localStorage.setItem(CHOICE_KEY, v); } catch (e) {}
    }

    function hideBanner() {
      var el = document.getElementById('wbe-consent-banner');
      if (el && el.parentNode) { el.parentNode.removeChild(el); }
    }

    function acceptAll() {
      setChoice('granted');
      grantConsent();
      hideBanner();
      console.log('[WBE-CONSENT] visitor accepted all');
    }

    function denyAll() {
      setChoice('denied');
      hideBanner();
      console.log('[WBE-CONSENT] visitor denied; defaults remain');
    }

    function showBanner() {
      if (document.getElementById('wbe-consent-banner')) { return; }
      var bar = document.createElement('div');
      bar.id = 'wbe-consent-banner';
      bar.setAttribute('role', 'dialog');
      bar.setAttribute('aria-label', 'Cookie consent');
      bar.style.cssText =
        'position:fixed;left:0;right:0;bottom:0;z-index:2147483000;' +
        'background:#12312a;color:#f3ede0;font-family:inherit;font-size:14px;' +
        'padding:14px 18px;display:flex;flex-wrap:wrap;align-items:center;' +
        'gap:12px;box-shadow:0 -2px 12px rgba(0,0,0,.35);';

      var text = document.createElement('div');
      text.style.cssText = 'flex:1 1 320px;min-width:260px;line-height:1.45;';
      text.innerHTML =
        'We use cookies to improve your experience and to show you relevant ' +
        'ads about Wanderlust Caribbean. ' +
        '<a href="' + PRIVACY_URL + '" style="color:#d9b95c;text-decoration:underline;">Privacy Policy</a>';
      bar.appendChild(text);

      var btns = document.createElement('div');
      btns.style.cssText = 'display:flex;gap:10px;flex:0 0 auto;';

      var deny = document.createElement('button');
      deny.type = 'button';
      deny.textContent = 'Deny';
      deny.style.cssText =
        'padding:9px 18px;border:1px solid #d9b95c;background:transparent;' +
        'color:#d9b95c;cursor:pointer;border-radius:4px;font-size:14px;';
      deny.addEventListener('click', denyAll);
      btns.appendChild(deny);

      var accept = document.createElement('button');
      accept.type = 'button';
      accept.textContent = 'Accept All';
      accept.style.cssText =
        'padding:9px 18px;border:none;background:#d9b95c;color:#12312a;' +
        'cursor:pointer;border-radius:4px;font-size:14px;font-weight:600;';
      accept.addEventListener('click', acceptAll);
      btns.appendChild(accept);

      bar.appendChild(btns);
      document.body.appendChild(bar);
    }

    function initBanner() {
      var choice = getChoice();
      if (choice === 'granted') {
        grantConsent();
        return;
      }
      if (choice === 'denied') { return; }
      showBanner();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initBanner);
    } else {
      initBanner();
    }
  })();

  // Receive GA4/Ads events from Velo page code via the wbeEventBridge HTML
  // iframe on the Master Page (Velo localStorage is partitioned; postMessage
  // through the iframe is the reliable cross-context channel).
  window.addEventListener('message', function (event) {
    var d = event && event.data;
    if (d && d.source === 'wbe-event-bridge' && d.payload) {
      window.dataLayer.push(d.payload);
    }
  });
</script>
