<!-- Google tag (gtag.js) + Consent Mode v2 — paste in Wix Settings → Custom Code → Head -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MKGG3X1WP9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  // Default consent: denied until user confirms.
  gtag('consent', 'default', {
    ad_storage: 'denied',
    analytics_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied'
  });

  // Configuration: one config call per Google property.
  gtag('config', 'G-MKGG3X1WP9');
  gtag('config', 'AW-788746633');

  // Helper to grant consent when the visitor accepts cookies.
  function grantConsent() {
    gtag('consent', 'update', {
      ad_storage: 'granted',
      analytics_storage: 'granted',
      ad_user_data: 'granted',
      ad_personalization: 'granted'
    });
  }

  // Listen for a custom event from your cookie banner (optional).
  document.addEventListener('wbeConsentGranted', grantConsent);

  // Flush events staged by Velo public/tracking.js into dataLayer.
  (function() {
    function flushQueue() {
      try {
        var raw = localStorage.getItem('wbe_dataLayer_queue');
        if (raw) {
          var queue = JSON.parse(raw);
          for (var i = 0; i < queue.length; i++) {
            window.dataLayer.push(queue[i]);
          }
          localStorage.removeItem('wbe_dataLayer_queue');
        }
      } catch (e) {}
    }

    flushQueue();

    var originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
      originalSetItem.apply(this, arguments);
      if (key === 'wbe_dataLayer_queue') {
        flushQueue();
      }
    };
  })();
</script>
