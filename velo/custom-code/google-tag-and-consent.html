<!-- Google tag (gtag.js) + Consent Mode v2 — paste in Wix Settings → Custom Code → Head -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MKGG3X1WP9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  // Default consent: denied until user confirms.
  gtag('consent', 'default', {
    ad_storage: 'denied',
    analytics_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied'
  });

  // Configuration: one config call per Google property.
  gtag('config', 'G-MKGG3X1WP9');
  gtag('config', 'AW-788746633');

  // Capture Google Ads click IDs before Wix's client-side router strips them.
  (function () {
    function parseParams(url) {
      const out = {};
      const idx = (url || '').indexOf('?');
      if (idx === -1) return out;
      const qs = url.substring(idx + 1);
      const pairs = qs.split('&');
      for (let i = 0; i < pairs.length; i++) {
        const pair = pairs[i];
        const eq = pair.indexOf('=');
        if (eq === -1) { out[decodeURIComponent(pair)] = ''; continue; }
        out[decodeURIComponent(pair.substring(0, eq))] = decodeURIComponent(pair.substring(eq + 1));
      }
      return out;
    }

    const params = parseParams(window.location.href);
    if (params.gclid || params.gbraid || params.wbraid) {
      try {
        const record = {
          gclid: params.gclid || '',
          gbraid: params.gbraid || '',
          wbraid: params.wbraid || '',
          landingUrl: window.location.href,
          capturedAt: new Date().toISOString()
        };
        localStorage.setItem('wl_click_attribution', JSON.stringify(record));
      } catch (e) {}
    }
  })();

  // Helper to grant consent when the visitor accepts cookies.
  var _consentGranted = false;
  function grantConsent() {
    if (_consentGranted) { return; }
    _consentGranted = true;
    gtag('consent', 'update', {
      ad_storage: 'granted',
      analytics_storage: 'granted',
      ad_user_data: 'granted',
      ad_personalization: 'granted'
    });
    console.log('[WBE-CONSENT] Google consent upgraded to granted');
  }

  // Path 1: custom event (works if dispatched from a non-sandboxed context).
  document.addEventListener('wbeConsentGranted', grantConsent);

  // Path 2 (primary): Velo master page flags localStorage when the Wix banner
  // reports advertising/analytics consent. The flag is written from the Velo
  // worker context, so setItem patching and the storage event won't see it on
  // this tab — poll instead: now, on an interval for 60s, and on visibility change.
  (function () {
    var KEY = 'wbe_consent_granted';
    function checkFlag() {
      try { if (localStorage.getItem(KEY)) { grantConsent(); } } catch (e) {}
    }
    checkFlag();
    var checks = 0;
    var timer = setInterval(function () {
      checks++;
      checkFlag();
      if (_consentGranted || checks > 120) { clearInterval(timer); }
    }, 500);
    document.addEventListener('visibilitychange', checkFlag);
    window.addEventListener('focus', checkFlag);
  })();

  // Flush events staged by Velo public/tracking.js into dataLayer.
  (function() {
    function flushQueue() {
      try {
        var raw = localStorage.getItem('wbe_dataLayer_queue');
        if (raw) {
          var queue = JSON.parse(raw);
          for (var i = 0; i < queue.length; i++) {
            window.dataLayer.push(queue[i]);
          }
          localStorage.removeItem('wbe_dataLayer_queue');
        }
      } catch (e) {}
    }

    flushQueue();

    var originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
      originalSetItem.apply(this, arguments);
      if (key === 'wbe_dataLayer_queue') {
        flushQueue();
      }
    };
  })();
</script>
