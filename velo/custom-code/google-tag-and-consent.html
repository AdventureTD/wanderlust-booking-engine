<!-- Google tag (gtag.js) + Consent Mode v2 — paste in Wix Settings → Custom Code → Head -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MKGG3X1WP9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  // Default consent: denied until user confirms.
  gtag('consent', 'default', {
    ad_storage: 'denied',
    analytics_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied'
  });

  // Configuration: one config call per Google property.
  gtag('config', 'G-MKGG3X1WP9');
  gtag('config', 'AW-788746633');

  // Capture Google Ads click IDs before Wix's client-side router strips them.
  (function () {
    function parseParams(url) {
      const out = {};
      const idx = (url || '').indexOf('?');
      if (idx === -1) return out;
      const qs = url.substring(idx + 1);
      const pairs = qs.split('&');
      for (let i = 0; i < pairs.length; i++) {
        const pair = pairs[i];
        const eq = pair.indexOf('=');
        if (eq === -1) { out[decodeURIComponent(pair)] = ''; continue; }
        out[decodeURIComponent(pair.substring(0, eq))] = decodeURIComponent(pair.substring(eq + 1));
      }
      return out;
    }

    const params = parseParams(window.location.href);
    if (params.gclid || params.gbraid || params.wbraid) {
      try {
        const record = {
          gclid: params.gclid || '',
          gbraid: params.gbraid || '',
          wbraid: params.wbraid || '',
          landingUrl: window.location.href,
          capturedAt: new Date().toISOString()
        };
        localStorage.setItem('wl_click_attribution', JSON.stringify(record));
      } catch (e) {}
    }
  })();

  // Grant consent per-category: the Wix banner's analytics/advertising toggles
  // map to their matching Google Consent Mode signals. A blanket grant would
  // unlock ad cookies for analytics-only visitors — this keeps it precise.
  // grantConsent() with no args = full grant (legacy callers).
  var _granted = { analytics: false, advertising: false };
  function grantConsent(analytics, advertising) {
    if (analytics === undefined) { analytics = true; advertising = true; }
    var update = {};
    if (analytics && !_granted.analytics) {
      update.analytics_storage = 'granted';
      _granted.analytics = true;
    }
    if (advertising && !_granted.advertising) {
      update.ad_storage = 'granted';
      update.ad_user_data = 'granted';
      update.ad_personalization = 'granted';
      _granted.advertising = true;
    }
    if (Object.keys(update).length > 0) {
      gtag('consent', 'update', update);
      console.log('[WBE-CONSENT] Google consent updated:', JSON.stringify(update));
    }
  }

  // Path 1: custom event (works if dispatched from a non-sandboxed context).
  document.addEventListener('wbeConsentGranted', function () { grantConsent(); });

  // Path 2 (primary): the Velo master page postMessages {type:'wbeConsentGranted',
  // analytics, advertising} when the Wix banner reports consent. window is shared
  // between the Velo worker and this head script (localStorage is NOT — Velo's
  // storage is partitioned), so this is the reliable cross-context channel.
  window.addEventListener('message', function (event) {
    var d = event && event.data;
    if (d && d.type === 'wbeConsentGranted') {
      grantConsent(d.analytics, d.advertising);
    }
  });

  // Flush events staged by Velo public/tracking.js into dataLayer.
  (function() {
    function flushQueue() {
      try {
        var raw = localStorage.getItem('wbe_dataLayer_queue');
        if (raw) {
          var queue = JSON.parse(raw);
          for (var i = 0; i < queue.length; i++) {
            window.dataLayer.push(queue[i]);
          }
          localStorage.removeItem('wbe_dataLayer_queue');
        }
      } catch (e) {}
    }

    flushQueue();

    var originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
      originalSetItem.apply(this, arguments);
      if (key === 'wbe_dataLayer_queue') {
        flushQueue();
      }
    };
  })();
</script>
