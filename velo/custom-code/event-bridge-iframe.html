<!DOCTYPE html>
<!-- Paste this into the wbeEventBridge HTML iframe on the Master Page.
     Receives postMessage events from Velo page code, relays them up to the
     parent window where the head snippet pushes them into window.dataLayer. -->
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  window.onmessage = function (event) {
    try {
      var d = event && event.data;
      if (d && d.type === 'wbe-datalayer-event' && d.payload) {
        window.parent.postMessage({
          source: 'wbe-event-bridge',
          payload: d.payload
        }, '*');
      }
    } catch (e) {}
  };
</script>
</body>
</html>
